<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codeoba</title>
    
    <!-- Preload Outfit and JetBrains Mono Fonts to prevent FOUT (Flash of Unstyled Text) -->
    <link rel="preload" href="/fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrainsmono-latin.woff2" as="font" type="font/woff2" crossorigin />
    
    <script>
      (function() {
        // Read theme settings to prevent theme flash
        const appearance = localStorage.getItem('codeoba-appearance') || 'dark';
        const darkTheme = localStorage.getItem('codeoba-dark-theme') || 'obsidian';
        const lightTheme = localStorage.getItem('codeoba-light-theme') || 'obsidian-light';
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        let activeTheme = 'obsidian';
        if (appearance === 'system') {
          activeTheme = systemDark ? darkTheme : lightTheme;
        } else {
          activeTheme = appearance === 'dark' ? darkTheme : lightTheme;
        }
        document.documentElement.setAttribute('data-theme', activeTheme);

        if (activeTheme === 'custom') {
          const isDark = (appearance === 'system') ? systemDark : (appearance === 'dark');
          const mode = isDark ? 'dark' : 'light';

          const getStoredHsl = (prefix, defH, defS, defL) => {
            const h = localStorage.getItem(`codeoba-custom-${mode}-${prefix}-h`) || String(defH);
            const s = localStorage.getItem(`codeoba-custom-${mode}-${prefix}-s`) || String(defS);
            const l = localStorage.getItem(`codeoba-custom-${mode}-${prefix}-l`) || String(defL);
            return { h, s, l };
          };

          const colors = {
            bg: isDark ? getStoredHsl('bg', 228, 15, 8) : getStoredHsl('bg', 210, 20, 95),
            surface: isDark ? getStoredHsl('surface', 228, 15, 11) : getStoredHsl('surface', 210, 20, 98),
            accent1: getStoredHsl('accent1', 238, 82, 66),
            accent2: getStoredHsl('accent2', 244, 79, 58)
          };

          const bgStr = `hsl(${colors.bg.h}, ${colors.bg.s}%, ${colors.bg.l}%)`;
          const surfaceStr = `hsl(${colors.surface.h}, ${colors.surface.s}%, ${colors.surface.l}%)`;
          const borderStr = `hsl(${colors.surface.h}, ${colors.surface.s}%, ${isDark ? parseInt(colors.surface.l) + 8 : parseInt(colors.surface.l) - 8}%)`;
          const accentStr = `hsl(${colors.accent1.h}, ${colors.accent1.s}%, ${colors.accent1.l}%)`;
          const accentHoverStr = `hsl(${colors.accent2.h}, ${colors.accent2.s}%, ${colors.accent2.l}%)`;
          const accentLightStr = `hsla(${colors.accent1.h}, ${colors.accent1.s}%, ${colors.accent1.l}%, 0.15)`;

          document.documentElement.style.setProperty('--background', bgStr);
          document.documentElement.style.setProperty('--surface', surfaceStr);
          document.documentElement.style.setProperty('--border', borderStr);
          document.documentElement.style.setProperty('--accent', accentStr);
          document.documentElement.style.setProperty('--accent-hover', accentHoverStr);
          document.documentElement.style.setProperty('--accent-light', accentLightStr);
          document.documentElement.style.setProperty('--text-primary', isDark ? '#f3f4f6' : '#0f172a');
          document.documentElement.style.setProperty('--text-secondary', isDark ? '#9ca3af' : '#475569');
        }

        // Read language settings to prevent layout flash / RTL shifts
        const lang = localStorage.getItem('codeoba-language') || 'en';
        document.documentElement.setAttribute('lang', lang);
        if (lang === 'ar') {
          document.documentElement.setAttribute('dir', 'rtl');
        } else {
          document.documentElement.setAttribute('dir', 'ltr');
        }

        // Read sidebar layout configuration to prevent visual layout shifts (CLS)
        const collapsed = localStorage.getItem('codeoba-sidebar-collapsed') === 'true';
        const sidebarWidth = collapsed ? '0px' : (localStorage.getItem('codeoba-sidebar-width') || '380') + 'px';
        document.documentElement.style.setProperty('--sk-sidebar-width', sidebarWidth);
        document.documentElement.style.setProperty('--sk-sidebar-display', collapsed ? 'none' : 'flex');
        document.documentElement.setAttribute('data-sidebar-collapsed', collapsed ? 'true' : 'false');
        document.documentElement.style.setProperty('--sk-header-height', '48px');

        const fontSize = localStorage.getItem('codeoba-font-size') || '15';
        document.documentElement.style.fontSize = fontSize + 'px';

        // Platform detection for window padding and spacers
        const isMac = /macintosh|mac os x/i.test(navigator.userAgent);
        document.documentElement.setAttribute('data-platform', isMac ? 'macos' : 'windows');
      })();
    </script>

      /* Base app-shell styling */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--background);
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      .sk-container {
        display: flex;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 100;
        background-color: var(--background);
        transition: opacity 250ms ease-out;
      }
      
      .sk-container.sk-fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .sk-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(22, 24, 31, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 50;
        box-sizing: border-box;
        -webkit-app-region: drag;
        app-region: drag;
      }

      /* Platform-specific padding for skeleton header */
      [data-platform="macos"] .sk-header {
        padding: 0 24px 0 80px;
      }
      [data-platform="windows"] .sk-header {
        padding: 0 140px 0 24px;
      }

      .sk-header button,
      .sk-header .no-drag {
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }

      .sk-header svg {
        display: block;
      }

      .sk-win-controls {
        display: none;
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        align-items: center;
        box-sizing: border-box;
      }
      [data-platform="windows"] .sk-win-controls {
        display: flex;
      }
      .sk-win-btn {
        height: 100%;
        width: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        opacity: 0.6;
        transition: all 150ms ease;
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      @media (hover: hover) {
        .sk-win-btn:hover {
          background-color: rgba(255, 255, 255, 0.08);
          color: var(--text-primary);
          opacity: 1;
        }
        .sk-win-close:hover {
          background-color: #dc2626 !important;
          color: #ffffff !important;
          opacity: 1;
        }
      }

      [data-theme="sunset-light"] .sk-header { border-bottom-color: rgba(0, 0, 0, 0.05); background: rgba(255, 255, 255, 0.7); }

      }

        width: 20%;
        height: 10px;
        background-color: var(--accent);
        opacity: 0.35;
        border-radius: 3px;
      }
      
      .sk-card-snippet-container {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
      }
      
      .sk-card-snippet {
        width: 100%;
        height: 10px;
        background-color: var(--text-secondary);
        opacity: 0.2;
        border-radius: 3px;
      }
      
      .sk-card-meta {
        justify-content: flex-start;
        gap: 6px;
        margin-top: auto;
      }
      
      .sk-card-pill-purple {
        width: 110px;
        height: 16px;
        background-color: rgba(141, 84, 255, 0.08);
        border: 1px solid rgba(141, 84, 255, 0.15);
        border-radius: 9999px;
      }
      
      .sk-card-pill-orange {
        width: 95px;
        height: 16px;
        background-color: rgba(249, 156, 0, 0.08);
        border: 1px solid rgba(249, 156, 0, 0.15);
        border-radius: 9999px;
      }
      
      .sk-card-stats {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-left: auto;
        opacity: 0.15;
      }
      
      .sk-card-stat-item {
        height: 10px;
        background-color: var(--text-secondary);
        border-radius: 3px;
      }
      
      .sk-line-1 {
        width: 60%;
        height: 14px;
        background-color: var(--border);
        border-radius: 4px;
      }
      
      .sk-line-2 {
        width: 85%;
        height: 10px;
        background-color: var(--border);
        opacity: 0.6;
        border-radius: 4px;
      }
      
      .sk-line-3 {
        width: 40%;
        height: 10px;
        background-color: var(--border);
        opacity: 0.4;
        border-radius: 4px;
      }
      
      .sk-content {
        flex-grow: 1;
        height: 100%;
        padding-top: 48px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      
      .sk-spinner-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      
      .sk-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.05);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: sk-spin 1s linear infinite;
      }
      
      .sk-spinner-text {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
      }
      
      @keyframes sk-spin {
        to { transform: rotate(360deg); }
      }
      
      .sk-pulse {
        animation: sk-pulsing 1.5s ease-in-out infinite;
      }
      
      @keyframes sk-pulsing {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <div id="sk-container" class="sk-container">
      <!-- Titlebar/Navigation bar -->
      <header class="sk-header" data-tauri-drag-region>
        <div class="sk-header-left">
          <div class="sk-logo-brand" data-tauri-drag-region>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sk-logo-svg" data-tauri-drag-region><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
            <span class="sk-logo-text" data-tauri-drag-region>CODEOBA</span>
            <span class="sk-logo-version" data-tauri-drag-region>v__APP_VERSION__</span>
          </div>
          
          <div class="sk-nav-container no-drag">
            <button id="sk-toggle-btn" class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg></button>
            <div class="sk-nav-divider"></div>
            <button class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></button>
            <button class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
            <button class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
            <button class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" class="sk-spin-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.72 2.78L21 8"/><path d="M21 3v5h-5"/></svg></button>
            <div class="sk-nav-divider"></div>
            <button class="sk-nav-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        
        <div class="sk-right-pill-group no-drag">
          <div class="sk-breadcrumbs" data-tauri-drag-region>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sk-breadcrumbs-svg" data-tauri-drag-region><path d="m12 3-10 5L12 13l10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
            <span class="sk-breadcrumbs-text" data-tauri-drag-region>Global Stats</span>
          </div>
          <button class="sk-bug-btn" disabled title="Bug Tracker">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-8"/><path d="M6 12H2"/><path d="M22 12h-4"/><path d="M7.5 7.5 4 4"/><path d="M20 4l-3.5 3.5"/><path d="M7.5 16.5 4 20"/><path d="M20 20l-3.5-3.5"/></svg>
          </button>
        </div>

        <!-- Fake Window Controls for Windows/Linux Skeleton -->
        <div class="sk-win-controls no-drag">
          <button class="sk-win-btn sk-win-min">
            <svg width="10" height="1" viewBox="0 0 10 1" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="0.5" x2="10" y2="0.5" /></svg>
          </button>
          <button class="sk-win-btn sk-win-max">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="0.5" y="0.5" width="9" height="9" /></svg>
          </button>
          <button class="sk-win-btn sk-win-close">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5,0.5 L9.5,9.5 M9.5,0.5 L0.5,9.5" /></svg>
          </button>
        </div>
      </header>

      <!-- Main Grid: Sidebar + Content -->
      <aside class="sk-sidebar" style="width: var(--sk-sidebar-width); min-width: var(--sk-sidebar-width); max-width: var(--sk-sidebar-width); display: var(--sk-sidebar-display);">
        <div class="sk-sidebar-header">
          <div class="sk-search-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sk-search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" class="sk-search-bar" placeholder="Search conversations..." disabled />
          </div>
          <div class="sk-groups-box">
            <button class="sk-groups-header-btn" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              <span>Groups</span>
            </button>
            <button class="sk-groups-action-btn" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
            </button>
          </div>
        </div>
        
        <div class="sk-divider"></div>
        
        <div class="sk-sort-by-row">
          <span class="sk-sort-by-label">SORT BY</span>
          <div class="sk-sort-by-buttons">
            <div class="sk-sort-btn active">Updated</div>
            <div class="sk-sort-btn">Tokens</div>
            <div class="sk-sort-btn">Speed</div>
            <div class="sk-sort-btn">Turns</div>
            <div class="sk-sort-btn">Duration</div>
          </div>
        </div>

        <div class="sk-list">
          <div class="sk-card sk-pulse">
            <div class="sk-card-row">
              <div class="sk-card-title"></div>
              <div class="sk-card-time"></div>
            </div>
            <div class="sk-card-row">
              <div class="sk-card-model"></div>
              <div class="sk-card-speed"></div>
            </div>
            <div class="sk-card-snippet-container">
              <div class="sk-card-snippet"></div>
              <div class="sk-card-snippet" style="width: 60%;"></div>
            </div>
            <div class="sk-card-row sk-card-meta">
              <div class="sk-card-pill-purple"></div>
              <div class="sk-card-pill-orange"></div>
              <div class="sk-card-stats">
                <div class="sk-card-stat-item" style="width: 35px;"></div>
                <div class="sk-card-stat-item" style="width: 25px;"></div>
                <div class="sk-card-stat-item" style="width: 40px;"></div>
              </div>
            </div>
          </div>
          
          <div class="sk-card sk-pulse" style="animation-delay: 0.15s;">
            <div class="sk-card-row">
              <div class="sk-card-title" style="width: 45%;"></div>
              <div class="sk-card-time"></div>
            </div>
            <div class="sk-card-row">
              <div class="sk-card-model" style="width: 40%;"></div>
              <div class="sk-card-speed"></div>
            </div>
            <div class="sk-card-snippet-container">
              <div class="sk-card-snippet"></div>
              <div class="sk-card-snippet" style="width: 40%;"></div>
            </div>
            <div class="sk-card-row sk-card-meta">
              <div class="sk-card-pill-purple"></div>
              <div class="sk-card-pill-orange"></div>
              <div class="sk-card-stats">
                <div class="sk-card-stat-item" style="width: 35px;"></div>
                <div class="sk-card-stat-item" style="width: 25px;"></div>
                <div class="sk-card-stat-item" style="width: 40px;"></div>
              </div>
            </div>
          </div>
          
          <div class="sk-card sk-pulse" style="animation-delay: 0.3s;">
            <div class="sk-card-row">
              <div class="sk-card-title" style="width: 60%;"></div>
              <div class="sk-card-time"></div>
            </div>
            <div class="sk-card-row">
              <div class="sk-card-model" style="width: 30%;"></div>
              <div class="sk-card-speed"></div>
            </div>
            <div class="sk-card-snippet-container">
              <div class="sk-card-snippet"></div>
              <div class="sk-card-snippet" style="width: 75%;"></div>
            </div>
            <div class="sk-card-row sk-card-meta">
              <div class="sk-card-pill-purple"></div>
              <div class="sk-card-pill-orange"></div>
              <div class="sk-card-stats">
                <div class="sk-card-stat-item" style="width: 35px;"></div>
                <div class="sk-card-stat-item" style="width: 25px;"></div>
                <div class="sk-card-stat-item" style="width: 40px;"></div>
              </div>
            </div>
          </div>
          
          <div class="sk-card sk-pulse" style="animation-delay: 0.45s;">
            <div class="sk-card-row">
              <div class="sk-card-title" style="width: 50%;"></div>
              <div class="sk-card-time"></div>
            </div>
            <div class="sk-card-row">
              <div class="sk-card-model" style="width: 35%;"></div>
              <div class="sk-card-speed"></div>
            </div>
            <div class="sk-card-snippet-container">
              <div class="sk-card-snippet"></div>
              <div class="sk-card-snippet" style="width: 50%;"></div>
            </div>
            <div class="sk-card-row sk-card-meta">
              <div class="sk-card-pill-purple"></div>
              <div class="sk-card-pill-orange"></div>
              <div class="sk-card-stats">
                <div class="sk-card-stat-item" style="width: 35px;"></div>
                <div class="sk-card-stat-item" style="width: 25px;"></div>
                <div class="sk-card-stat-item" style="width: 40px;"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main content area -->
      <main class="sk-content">
        <div class="sk-spinner-container">
          <div class="sk-spinner"></div>
          <p class="sk-spinner-text">Scanning local session adapters...</p>
        </div>
      </main>
    </div>
    <script>
      (function() {
        const collapsed = localStorage.getItem('codeoba-sidebar-collapsed') === 'true';
        if (collapsed) {
          const btn = document.getElementById('sk-toggle-btn');
          if (btn) {
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m9 15 3-3-3-3"/></svg>';
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
